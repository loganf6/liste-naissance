    <style>
        body { 
            background: radial-gradient(circle at top, #FDFBF7 0%, #F5F0E6 100%);

            font-family: 'Montserrat', sans-serif; 
        }
        .font-serif { font-family: 'Fraunces', serif; }
        
        /* Animation fluide pour les cartes */
        .gift-card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 20px -2px rgba(90, 80, 70, 0.03), 0 2px 6px -1px rgba(90, 80, 70, 0.02);
        }
        .gift-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px -5px rgba(90, 80, 70, 0.08), 0 10px 15px -3px rgba(90, 80, 70, 0.04);
            border-color: #DCD5C9 !important;
        }
        
        /* Apparition en fondu des éléments de la grille */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.6s ease forwards; }
    </style>
</head>
